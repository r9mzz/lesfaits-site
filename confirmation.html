<!DOCTYPE html>
<html lang="fr" data-theme="">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script>(function(){var s=localStorage.getItem('theme');var d=s==='dark'||(s===null&&window.matchMedia('(prefers-color-scheme:dark)').matches);document.documentElement.setAttribute('data-theme',d?'dark':'light');})();</script>
<main style="max-width:560px;margin:15vh auto 0;padding:0 24px;text-align:center">

  <p style="color:var(--muted);line-height:1.7;margin-bottom:8px">Votre abonnement à la newsletter de <strong>Les Faits</strong> est maintenant actif.</p>
  <p style="color:var(--muted);line-height:1.7;margin-bottom:32px">Vous recevrez le résumé du jour selon les préférences choisies. Désabonnement possible en un clic depuis n'importe quel email.</p>
  <a href="/" style="display:inline-block;padding:10px 24px;background:var(--blue);color:#fff;border-radius:var(--radius);font-size:14px;font-weight:600;text-decoration:none">← Retour au site</a>
</main>
